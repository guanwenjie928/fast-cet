<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单词游戏 — Fast CET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="../css/reset.css?v=af37c8f">
  <link rel="stylesheet" href="../css/variables.css?v=af37c8f">
  <link rel="stylesheet" href="../css/global.css?v=af37c8f">
  <link rel="stylesheet" href="../css/nav.css?v=af37c8f">
  <link rel="stylesheet" href="../css/content.css?v=af37c8f">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <style>
    /* ── Game Mode Tabs ── */
    .game-tabs {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
    }

    .game-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      color: var(--color-text-secondary);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
    }

    .game-tab:hover {
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    .game-tab--active {
      color: #FFF;
      background: var(--gradient-hero);
      border-color: transparent;
      box-shadow: var(--shadow-md);
    }

    .game-tab__icon {
      font-size: 20px;
    }

    /* ── Game Panel ── */
    .game-panel {
      display: none;
    }

    .game-panel--active {
      display: block;
    }

    /* ── Game Layout ── */
    .game-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: var(--space-xl);
      align-items: start;
    }

    /* ── Game Stage ── */
    .game-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-lg);
    }

    .game-card {
      width: 100%;
      max-width: 600px;
      min-height: 360px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .game-card:hover {
      box-shadow: var(--shadow-md);
    }

    .game-card__badge {
      position: absolute;
      top: 20px;
      left: 24px;
      padding: 4px 14px;
      font-size: 11px;
      font-weight: var(--weight-bold);
      color: var(--color-primary);
      background: rgba(99,102,241,0.08);
      border-radius: var(--radius-full);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .game-card__score-badge {
      position: absolute;
      top: 20px;
      right: 24px;
      font-family: var(--font-en);
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      color: var(--color-accent);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Completion Game ── */
    .completion__definition {
      font-size: var(--text-lg);
      color: var(--color-text);
      font-weight: var(--weight-semibold);
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .completion__pos {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-bottom: 28px;
      padding: 4px 12px;
      background: rgba(245,158,11,0.1);
      border-radius: var(--radius-full);
      display: inline-block;
    }

    .completion__word-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .completion__letter {
      width: 44px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-en);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      background: var(--gradient-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      transition: all 0.25s ease;
      text-transform: lowercase;
    }

    .completion__letter--blank {
      border: 2px dashed var(--color-primary);
      background: rgba(99,102,241,0.06);
      color: transparent;
      cursor: pointer;
      position: relative;
    }

    .completion__letter--blank.completion__letter--filled {
      color: var(--color-primary);
      border-style: solid;
      background: rgba(99,102,241,0.12);
      animation: letter-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .completion__letter--blank.completion__letter--wrong {
      color: var(--color-error);
      border-color: var(--color-error);
      background: rgba(239,68,68,0.08);
      animation: shake 0.4s ease;
    }

    .completion__letter--active {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
      background: rgba(245,158,11,0.08);
    }

    @keyframes letter-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .completion__hint {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-top: 16px;
      min-height: 24px;
    }

    .completion__input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .completion__char-input {
      width: 52px;
      height: 52px;
      text-align: center;
      font-family: var(--font-en);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      background: var(--glass-bg);
      border: 2px solid var(--color-primary);
      border-radius: var(--radius-sm);
      outline: none;
      caret-color: var(--color-primary);
      transition: border-color 0.2s ease;
      text-transform: lowercase;
    }

    .completion__char-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
    }

    .completion__char-input.completion__char-input--correct {
      border-color: var(--color-success);
      background: rgba(16,185,129,0.08);
    }

    .completion__char-input.completion__char-input--wrong {
      border-color: var(--color-error);
      background: rgba(239,68,68,0.08);
      animation: shake 0.4s ease;
    }

    .completion__skip-label {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-top: 20px;
    }

    /* ── Translation Game ── */
    .translation__question {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: var(--weight-bold);
      color: var(--color-text);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .translation__direction {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      margin-bottom: 28px;
      padding: 4px 12px;
      background: rgba(99,102,241,0.08);
      border-radius: var(--radius-full);
      display: inline-block;
    }

    .translation__options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .translation__option {
      padding: 16px 20px;
      font-size: var(--text-base);
      font-weight: var(--weight-medium);
      color: var(--color-text);
      background: var(--gradient-card);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
      line-height: 1.5;
    }

    .translation__option:hover {
      border-color: var(--color-primary);
      background: rgba(99,102,241,0.08);
      transform: translateY(-2px);
    }

    .translation__option--correct {
      border-color: var(--color-success);
      background: rgba(16,185,129,0.12);
      color: var(--color-success);
      font-weight: var(--weight-bold);
    }

    .translation__option--wrong {
      border-color: var(--color-error);
      background: rgba(239,68,68,0.08);
      color: var(--color-error);
      animation: shake 0.4s ease;
    }

    .translation__option--disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    .translation__option--reveal {
      border-color: var(--color-success);
      background: rgba(16,185,129,0.12);
      color: var(--color-success);
      font-weight: var(--weight-bold);
    }

    /* ── Game Actions ── */
    .game-actions {
      display: flex;
      gap: var(--space-md);
      width: 100%;
      max-width: 600px;
    }

    .btn-game {
      flex: 1;
      padding: 14px 24px;
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-game--primary {
      background: var(--gradient-hero);
      color: #FFF;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }

    .btn-game--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99,102,241,0.4);
    }

    .btn-game--primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-game--ghost {
      background: transparent;
      border: 1.5px solid var(--color-border);
      color: var(--color-text-secondary);
    }

    .btn-game--ghost:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* ── Sidebar Stats ── */
    .game-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
      position: sticky;
      top: calc(var(--nav-height, 72px) + 24px);
    }

    .game-stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .game-stat-card__title {
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-md);
    }

    .game-stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }

    .game-stat-item {
      text-align: center;
      padding: 16px 12px;
      background: var(--gradient-card);
      border-radius: var(--radius-md);
    }

    .game-stat-item__number {
      font-family: var(--font-en);
      font-size: var(--text-2xl);
      font-weight: var(--weight-extrabold);
      color: var(--color-text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .game-stat-item__number--correct {
      color: var(--color-success);
    }

    .game-stat-item__number--wrong {
      color: var(--color-error);
    }

    .game-stat-item__number--streak {
      color: var(--color-accent);
    }

    .game-stat-item__label {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }

    /* ── Streak Indicator ── */
    .streak-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      background: var(--gradient-card);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      color: var(--color-text);
      margin-bottom: var(--space-md);
    }

    .streak-bar__flame {
      font-size: 20px;
      animation: flame-flicker 0.6s ease-in-out infinite alternate;
    }

    @keyframes flame-flicker {
      0% { transform: scale(1) rotate(-2deg); }
      100% { transform: scale(1.15) rotate(2deg); }
    }

    .streak-bar__count {
      font-family: var(--font-en);
      font-weight: var(--weight-extrabold);
      color: var(--color-accent);
    }

    /* ── Completion State ── */
    .game-card--complete {
      padding: 48px 40px;
      gap: 16px;
    }

    .game-card__complete-icon {
      font-size: 64px;
      margin-bottom: 8px;
    }

    .game-card__complete-title {
      font-family: var(--font-en);
      font-size: var(--text-2xl);
      font-weight: var(--weight-extrabold);
      color: var(--color-text);
    }

    .game-card__complete-stats {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      line-height: 2;
      text-align: center;
    }

    .game-card__complete-word {
      display: inline-block;
      font-family: var(--font-en);
      font-weight: var(--weight-bold);
      color: var(--color-primary);
      margin: 0 4px;
    }

    /* ── Difficulty Selector ── */
    .difficulty-selector {
      display: flex;
      gap: 6px;
      margin-bottom: var(--space-lg);
    }

    .difficulty-btn {
      padding: 6px 16px;
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      color: var(--color-text-secondary);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
    }

    .difficulty-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .difficulty-btn--active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #FFF;
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .game-layout {
        grid-template-columns: 1fr;
      }

      .game-sidebar {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .game-card {
        padding: 28px 20px;
        min-height: 300px;
      }

      .completion__letter {
        width: 36px;
        height: 44px;
        font-size: var(--text-lg);
      }

      .completion__char-input {
        width: 44px;
        height: 44px;
        font-size: var(--text-lg);
      }

      .translation__options {
        grid-template-columns: 1fr;
      }

      .game-tabs {
        flex-direction: column;
      }

      .game-tab {
        justify-content: center;
      }

      .game-stat-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="content-page container">
    <div class="breadcrumb">
      <a href="../index.html">首页</a>
      <span class="breadcrumb__sep">/</span>
      <span class="breadcrumb__current">单词游戏</span>
    </div>
    <header class="page-header">
      <h1>单词游戏</h1>
      <p>在游戏中巩固词汇记忆 — 拼写模式练拼写，翻译模式练释义，让背单词不再枯燥</p>
    </header>

    <!-- Game Mode Tabs -->
    <div class="game-tabs" id="gameTabs">
      <button class="game-tab game-tab--active" data-game="completion" onclick="switchGame('completion')">
        <span class="game-tab__icon">🔤</span> 拼写挑战
      </button>
      <button class="game-tab" data-game="translation" onclick="switchGame('translation')">
        <span class="game-tab__icon">🔄</span> 翻译闯关
      </button>
    </div>

    <!-- Completion Game Panel -->
    <div class="game-panel game-panel--active" id="panelCompletion">
      <div class="difficulty-selector" id="completionDifficulty">
        <button class="difficulty-btn difficulty-btn--active" data-level="all" onclick="setCompletionDifficulty('all', this)">全部</button>
        <button class="difficulty-btn" data-level="easy" onclick="setCompletionDifficulty('easy', this)">简单(1-2)</button>
        <button class="difficulty-btn" data-level="medium" onclick="setCompletionDifficulty('medium', this)">中等(3-4)</button>
        <button class="difficulty-btn" data-level="hard" onclick="setCompletionDifficulty('hard', this)">困难(5)</button>
      </div>

      <div class="game-layout">
        <div class="game-stage">
          <div class="streak-bar" id="completionStreakBar" style="display:none">
            <span class="streak-bar__flame">🔥</span>
            连续正确 <span class="streak-bar__count" id="completionStreakCount">0</span> 题
          </div>

          <div class="game-card" id="completionCard">
            <!-- Dynamically rendered -->
          </div>

          <div class="game-actions" id="completionActions">
            <button class="btn-game btn-game--ghost" onclick="skipCompletionWord()">跳过</button>
            <button class="btn-game btn-game--primary" id="completionSubmitBtn" onclick="checkCompletionAnswer()">确认</button>
          </div>

          <button class="btn-game btn-game--ghost" id="completionResetBtn" style="display:none;max-width:600px;width:100%" onclick="resetCompletionGame()">
            重新开始
          </button>
        </div>

        <aside class="game-sidebar">
          <div class="game-stat-card">
            <h3 class="game-stat-card__title">拼写统计</h3>
            <div class="game-stat-grid">
              <div class="game-stat-item">
                <div class="game-stat-item__number" id="compStatRound">0</div>
                <div class="game-stat-item__label">当前轮次</div>
              </div>
              <div class="game-stat-item">
                <div class="game-stat-item__number game-stat-item__number--streak" id="compStatBest">0</div>
                <div class="game-stat-item__label">最佳连击</div>
              </div>
              <div class="game-stat-item">
                <div class="game-stat-item__number game-stat-item__number--correct" id="compStatCorrect">0</div>
                <div class="game-stat-item__label">正确</div>
              </div>
              <div class="game-stat-item">
                <div class="game-stat-item__number game-stat-item__number--wrong" id="compStatWrong">0</div>
                <div class="game-stat-item__label">错误</div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <!-- Translation Game Panel -->
    <div class="game-panel" id="panelTranslation">
      <div class="game-layout">
        <div class="game-stage">
          <div class="streak-bar" id="transStreakBar" style="display:none">
            <span class="streak-bar__flame">🔥</span>
            连续正确 <span class="streak-bar__count" id="transStreakCount">0</span> 题
          </div>

          <div class="game-card" id="translationCard">
            <!-- Dynamically rendered -->
          </div>

          <div class="game-actions" id="translationActions">
            <button class="btn-game btn-game--ghost" onclick="skipTranslationWord()">跳过</button>
            <button class="btn-game btn-game--primary" id="translationNextBtn" onclick="nextTranslationWord()" style="display:none">下一题 →</button>
          </div>

          <button class="btn-game btn-game--ghost" id="translationResetBtn" style="display:none;max-width:600px;width:100%" onclick="resetTranslationGame()">
            重新开始
          </button>
        </div>

        <aside class="game-sidebar">
          <div class="game-stat-card">
            <h3 class="game-stat-card__title">翻译统计</h3>
            <div class="game-stat-grid">
              <div class="game-stat-item">
                <div class="game-stat-item__number" id="transStatRound">0</div>
                <div class="game-stat-item__label">当前轮次</div>
              </div>
              <div class="game-stat-item">
                <div class="game-stat-item__number game-stat-item__number--streak" id="transStatBest">0</div>
                <div class="game-stat-item__label">最佳连击</div>
              </div>
              <div class="game-stat-item">
                <div class="game-stat-item__number game-stat-item__number--correct" id="transStatCorrect">0</div>
                <div class="game-stat-item__label">正确</div>
              </div>
              <div class="game-stat-item">
                <div class="game-stat-item__number game-stat-item__number--wrong" id="transStatWrong">0</div>
                <div class="game-stat-item__label">错误</div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script src="../js/main.js?v=af37c8f"></script>
  <script src="../js/data-loader.js?v=af37c8f"></script>
  <script>
    initApp();

    /* ═══════════════════════════════════════════════════
       Shared State
       ═══════════════════════════════════════════════════ */
    let allWords = [];
    let currentGame = 'completion';

    /* ── Load Vocabulary ── */
    async function loadWordBank() {
      const data = await DataLoader.loadQuestionBank('vocabulary');
      if (data && data.items && data.items.length > 0) {
        allWords = data.items;
      }
      if (allWords.length === 0) {
        document.getElementById('completionCard').innerHTML =
          '<div class="empty-state"><div class="empty-state__icon">📭</div><div class="empty-state__title">暂无词汇数据</div></div>';
        document.getElementById('translationCard').innerHTML =
          '<div class="empty-state"><div class="empty-state__icon">📭</div><div class="empty-state__title">暂无词汇数据</div></div>';
        return;
      }
      initCompletionGame();
      initTranslationGame();
    }

    /* ── Switch Game Tab ── */
    function switchGame(game) {
      currentGame = game;
      document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('game-tab--active'));
      document.querySelector(`.game-tab[data-game="${game}"]`).classList.add('game-tab--active');
      document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('game-panel--active'));
      document.getElementById(game === 'completion' ? 'panelCompletion' : 'panelTranslation').classList.add('game-panel--active');

      // Re-trigger card animation
      if (game === 'completion' && CompletionGame.pool.length > 0) {
        renderCompletionCard();
      } else if (game === 'translation' && TranslationGame.pool.length > 0) {
        renderTranslationCard();
      }
    }

    /* ═══════════════════════════════════════════════════
       Completion Game — 拼写挑战
       ═══════════════════════════════════════════════════ */
    const CompletionGame = {
      pool: [],
      currentIndex: 0,
      round: 0,
      correctCount: 0,
      wrongCount: 0,
      streak: 0,
      bestStreak: 0,
      difficulty: 'all',
      blanks: [],        // indices of blank positions in current word
      filledLetters: {}, // { blankIdx: 'letter' } — user input
      currentBlankIdx: 0,
      isComplete: false,
      isSubmitted: false,
    };

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildCompletionPool() {
      let filtered = [...allWords];
      if (CompletionGame.difficulty === 'easy') {
        filtered = filtered.filter(w => w.difficulty <= 2);
      } else if (CompletionGame.difficulty === 'medium') {
        filtered = filtered.filter(w => w.difficulty >= 3 && w.difficulty <= 4);
      } else if (CompletionGame.difficulty === 'hard') {
        filtered = filtered.filter(w => w.difficulty === 5);
      }
      // Filter out words that are too short (need at least 3 chars)
      filtered = filtered.filter(w => w.word.length >= 3);
      CompletionGame.pool = shuffleArray(filtered);
    }

    function initCompletionGame() {
      CompletionGame.currentIndex = 0;
      CompletionGame.round = 0;
      CompletionGame.correctCount = 0;
      CompletionGame.wrongCount = 0;
      CompletionGame.streak = 0;
      CompletionGame.bestStreak = 0;
      CompletionGame.isComplete = false;
      CompletionGame.isSubmitted = false;
      buildCompletionPool();
      updateCompletionStatsUI();
      document.getElementById('completionResetBtn').style.display = 'none';
      document.getElementById('completionSubmitBtn').style.display = '';
      document.getElementById('completionStreakBar').style.display = 'none';
      if (CompletionGame.pool.length > 0) {
        renderCompletionCard();
      }
    }

    function setCompletionDifficulty(level, btn) {
      CompletionGame.difficulty = level;
      document.querySelectorAll('#completionDifficulty .difficulty-btn').forEach(b => b.classList.remove('difficulty-btn--active'));
      btn.classList.add('difficulty-btn--active');
      initCompletionGame();
    }

    function generateBlanks(word) {
      const len = word.length;
      let blankCount;
      if (len <= 4) {
        blankCount = 1;
      } else if (len <= 7) {
        blankCount = 2;
      } else {
        blankCount = Math.min(3, Math.floor(len * 0.4));
      }

      // Pick random positions to blank out (avoid first letter as it's the biggest hint)
      const candidates = [];
      for (let i = 1; i < len; i++) {
        // Only blank letters (not hyphens, spaces, apostrophes)
        if (/[a-zA-Z]/.test(word[i])) {
          candidates.push(i);
        }
      }

      if (candidates.length === 0) return [];

      const shuffled = shuffleArray([...candidates]);
      return shuffled.slice(0, Math.min(blankCount, shuffled.length)).sort((a, b) => a - b);
    }

    function renderCompletionCard() {
      if (CompletionGame.currentIndex >= CompletionGame.pool.length) {
        renderCompletionComplete();
        return;
      }

      CompletionGame.isComplete = false;
      CompletionGame.isSubmitted = false;
      const word = CompletionGame.pool[CompletionGame.currentIndex];
      CompletionGame.blanks = generateBlanks(word.word);
      CompletionGame.filledLetters = {};
      CompletionGame.currentBlankIdx = 0;

      const card = document.getElementById('completionCard');
      card.className = 'game-card';

      // Build letter boxes
      let lettersHTML = '';
      for (let i = 0; i < word.word.length; i++) {
        const ch = word.word[i];
        if (!/[a-zA-Z]/.test(ch)) {
          // Non-letter characters (hyphens, spaces, etc.) shown as-is
          lettersHTML += `<span class="completion__letter" style="border:none;background:transparent;width:auto;min-width:20px">${ch}</span>`;
        } else if (CompletionGame.blanks.includes(i)) {
          lettersHTML += `<span class="completion__letter completion__letter--blank" data-blank-idx="${CompletionGame.blanks.indexOf(i)}" id="blankCell${CompletionGame.blanks.indexOf(i)}"></span>`;
        } else {
          lettersHTML += `<span class="completion__letter">${ch}</span>`;
        }
      }

      const categoryLabel = { verb: '动词', noun: '名词', adjective: '形容词', adverb: '副词', phrase: '短语' }[word.category] || word.category;

      card.innerHTML = `
        <span class="game-card__badge">${categoryLabel}</span>
        <span class="game-card__score-badge">⭐ ${word.difficulty}/5</span>
        <div class="completion__definition">${word.definition}</div>
        <div class="completion__pos">/ ${word.pronunciation} /</div>
        <div class="completion__word-row" id="letterRow">
          ${lettersHTML}
        </div>
        <div class="completion__hint" id="completionHint">
          请填入缺失的字母（共 ${CompletionGame.blanks.length} 个）
        </div>
        <div class="completion__input-row" id="completionInputRow">
          <input type="text" class="completion__char-input" id="completionCharInput" maxlength="1" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <span style="font-size:var(--text-xs);color:var(--color-text-secondary)">按 Enter 确认</span>
        </div>
        <div class="completion__skip-label">提示：按 Tab 跳到下一个空</div>
      `;

      document.getElementById('completionSubmitBtn').style.display = '';
      document.getElementById('completionSubmitBtn').disabled = false;
      document.getElementById('completionSubmitBtn').textContent = '确认';

      // Focus first blank
      highlightActiveBlank();
      focusCharInput();

      // Enter key to submit
      document.getElementById('completionCharInput').addEventListener('keydown', handleCompletionKey);

      gsap.fromTo(card, { opacity: 0, y: 30, scale: 0.95 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'power3.out' });
    }

    function handleCompletionKey(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        checkCompletionAnswer();
      } else if (e.key === 'Tab') {
        e.preventDefault();
        // Save current input value before moving
        const input = document.getElementById('completionCharInput');
        if (input && input.value.trim()) {
          saveCurrentBlankLetter(input.value.trim().toLowerCase());
        }
        // Move to next blank
        CompletionGame.currentBlankIdx = (CompletionGame.currentBlankIdx + 1) % CompletionGame.blanks.length;
        highlightActiveBlank();
        focusCharInput();
      }
    }

    function saveCurrentBlankLetter(letter) {
      const blankIdx = CompletionGame.blanks[CompletionGame.currentBlankIdx];
      const cellIdx = CompletionGame.blanks.indexOf(blankIdx);
      const cell = document.getElementById('blankCell' + cellIdx);
      const word = CompletionGame.pool[CompletionGame.currentIndex].word;
      const correctLetter = word[blankIdx].toLowerCase();

      if (letter === correctLetter) {
        CompletionGame.filledLetters[cellIdx] = letter;
        cell.textContent = letter;
        cell.classList.add('completion__letter--filled');
        cell.classList.remove('completion__letter--wrong');
      } else {
        cell.textContent = letter;
        cell.classList.add('completion__letter--wrong');
        // Flash wrong, then clear
        setTimeout(() => {
          cell.textContent = '';
          cell.classList.remove('completion__letter--wrong');
        }, 600);
      }
    }

    function highlightActiveBlank() {
      // Remove all active states
      document.querySelectorAll('.completion__letter--blank').forEach(el => el.classList.remove('completion__letter--active'));
      // Highlight current
      const cellIdx = CompletionGame.blanks.indexOf(CompletionGame.blanks[CompletionGame.currentBlankIdx]);
      const cell = document.getElementById('blankCell' + cellIdx);
      if (cell && !CompletionGame.filledLetters.hasOwnProperty(cellIdx)) {
        cell.classList.add('completion__letter--active');
      }
    }

    function focusCharInput() {
      const input = document.getElementById('completionCharInput');
      if (input) {
        input.value = '';
        input.className = 'completion__char-input';
        setTimeout(() => input.focus(), 100);
      }
    }

    function checkCompletionAnswer() {
      if (CompletionGame.isSubmitted) return;

      const input = document.getElementById('completionCharInput');
      if (!input) return;

      const letter = input.value.trim().toLowerCase();
      if (!letter || !/[a-zA-Z]/.test(letter)) {
        // Shake input to indicate need
        input.classList.add('completion__char-input--wrong');
        setTimeout(() => input.classList.remove('completion__char-input--wrong'), 400);
        return;
      }

      saveCurrentBlankLetter(letter);

      // Check if all blanks are filled
      const allFilled = CompletionGame.blanks.every((blankIdx, i) => {
        return CompletionGame.filledLetters.hasOwnProperty(i);
      });

      if (!allFilled) {
        // Move to next unfilled blank
        for (let i = 0; i < CompletionGame.blanks.length; i++) {
          if (!CompletionGame.filledLetters.hasOwnProperty(i)) {
            CompletionGame.currentBlankIdx = i;
            highlightActiveBlank();
            focusCharInput();
            return;
          }
        }
      }

      // All blanks filled — check answer
      CompletionGame.isSubmitted = true;
      const word = CompletionGame.pool[CompletionGame.currentIndex];
      let allCorrect = true;

      CompletionGame.blanks.forEach((blankIdx, i) => {
        const correctLetter = word.word[blankIdx].toLowerCase();
        const userLetter = CompletionGame.filledLetters[i] || '';
        const cell = document.getElementById('blankCell' + i);
        if (userLetter === correctLetter) {
          cell.classList.add('completion__letter--filled');
          cell.classList.remove('completion__letter--wrong');
        } else {
          allCorrect = false;
          cell.classList.add('completion__letter--wrong');
          // Show correct letter
          cell.textContent = correctLetter;
          cell.style.color = 'var(--color-success)';
        }
      });

      // Update input
      input.classList.add(allCorrect ? 'completion__char-input--correct' : 'completion__char-input--wrong');
      input.disabled = true;

      const hint = document.getElementById('completionHint');
      if (allCorrect) {
        CompletionGame.correctCount++;
        CompletionGame.streak++;
        if (CompletionGame.streak > CompletionGame.bestStreak) {
          CompletionGame.bestStreak = CompletionGame.streak;
        }
        hint.innerHTML = '<span style="color:var(--color-success)">✓ 正确！太棒了！</span>';
        // Show streak bar
        const streakBar = document.getElementById('completionStreakBar');
        streakBar.style.display = 'flex';
        document.getElementById('completionStreakCount').textContent = CompletionGame.streak;
        gsap.fromTo(streakBar, { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(1.4)' });
      } else {
        CompletionGame.wrongCount++;
        CompletionGame.streak = 0;
        document.getElementById('completionStreakBar').style.display = 'none';
        hint.innerHTML = `<span style="color:var(--color-error)">✗ 错误。正确答案：</span><span style="font-family:var(--font-en);font-weight:var(--weight-bold);color:var(--color-success)">${word.word}</span>`;
      }

      CompletionGame.round++;
      updateCompletionStatsUI();

      // Change submit button to next
      const submitBtn = document.getElementById('completionSubmitBtn');
      submitBtn.textContent = '下一题 →';
      submitBtn.onclick = nextCompletionWord;
    }

    function nextCompletionWord() {
      CompletionGame.isSubmitted = false;
      CompletionGame.currentIndex++;
      CompletionGame.filledLetters = {};

      if (CompletionGame.currentIndex >= CompletionGame.pool.length) {
        renderCompletionComplete();
      } else {
        // Animate transition
        const card = document.getElementById('completionCard');
        const actions = document.getElementById('completionActions');
        gsap.to([card, actions], { opacity: 0, y: -20, duration: 0.25, ease: 'power2.in', onComplete: () => {
          renderCompletionCard();
          // Restore submit button
          const btn = document.getElementById('completionSubmitBtn');
          btn.textContent = '确认';
          btn.onclick = checkCompletionAnswer;
          btn.disabled = false;
          gsap.to([card, actions], { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' });
        }});
      }
    }

    function skipCompletionWord() {
      if (CompletionGame.isSubmitted) return;
      CompletionGame.wrongCount++;
      CompletionGame.streak = 0;
      CompletionGame.round++;
      document.getElementById('completionStreakBar').style.display = 'none';
      updateCompletionStatsUI();

      const word = CompletionGame.pool[CompletionGame.currentIndex];
      const hint = document.getElementById('completionHint');
      hint.innerHTML = `<span style="color:var(--color-accent)">已跳过。正确答案：</span><span style="font-family:var(--font-en);font-weight:var(--weight-bold);color:var(--color-primary)">${word.word}</span>`;

      // Reveal all blanks
      CompletionGame.blanks.forEach((blankIdx, i) => {
        const cell = document.getElementById('blankCell' + i);
        if (cell && !CompletionGame.filledLetters.hasOwnProperty(i)) {
          cell.textContent = word.word[blankIdx];
          cell.style.color = 'var(--color-accent)';
          cell.classList.add('completion__letter--filled');
        }
      });

      const input = document.getElementById('completionCharInput');
      if (input) input.disabled = true;
      CompletionGame.isSubmitted = true;
      CompletionGame.currentIndex++;

      const submitBtn = document.getElementById('completionSubmitBtn');
      submitBtn.textContent = '下一题 →';
      submitBtn.onclick = nextCompletionWord;
    }

    function renderCompletionComplete() {
      CompletionGame.isComplete = true;
      const card = document.getElementById('completionCard');
      const total = CompletionGame.round;
      const pct = total > 0 ? Math.round((CompletionGame.correctCount / total) * 100) : 0;

      card.className = 'game-card game-card--complete';
      card.innerHTML = `
        <div class="game-card__complete-icon">${pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚'}</div>
        <div class="game-card__complete-title">${pct >= 80 ? '词汇大师！' : pct >= 50 ? '继续加油！' : '挑战完成'}</div>
        <div class="game-card__complete-stats">
          共完成 <strong>${total}</strong> 题<br>
          正确 <strong style="color:var(--color-success)">${CompletionGame.correctCount}</strong> ·
          错误 <strong style="color:var(--color-error)">${CompletionGame.wrongCount}</strong><br>
          正确率 <strong>${pct}%</strong> ·
          最佳连击 <strong style="color:var(--color-accent)">${CompletionGame.bestStreak}</strong>
        </div>
      `;
      gsap.fromTo(card, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.6, ease: 'back.out(1.4)' });

      document.getElementById('completionActions').innerHTML = '';
      document.getElementById('completionResetBtn').style.display = '';
      document.getElementById('completionStreakBar').style.display = 'none';
    }

    function resetCompletionGame() {
      initCompletionGame();
      document.getElementById('completionActions').innerHTML = `
        <button class="btn-game btn-game--ghost" onclick="skipCompletionWord()">跳过</button>
        <button class="btn-game btn-game--primary" id="completionSubmitBtn" onclick="checkCompletionAnswer()">确认</button>
      `;
    }

    function updateCompletionStatsUI() {
      document.getElementById('compStatRound').textContent = CompletionGame.round;
      document.getElementById('compStatCorrect').textContent = CompletionGame.correctCount;
      document.getElementById('compStatWrong').textContent = CompletionGame.wrongCount;
      document.getElementById('compStatBest').textContent = CompletionGame.bestStreak;
    }

    /* ═══════════════════════════════════════════════════
       Translation Game — 翻译闯关
       ═══════════════════════════════════════════════════ */
    const TranslationGame = {
      pool: [],
      currentIndex: 0,
      round: 0,
      correctCount: 0,
      wrongCount: 0,
      streak: 0,
      bestStreak: 0,
      isComplete: false,
      isAnswered: false,
      // Current question: 'en2zh' (show English, pick Chinese) or 'zh2en' (show Chinese, pick English)
      direction: 'en2zh',
    };

    function buildTranslationPool() {
      // Use all words, shuffle
      TranslationGame.pool = shuffleArray([...allWords]);
    }

    function initTranslationGame() {
      TranslationGame.currentIndex = 0;
      TranslationGame.round = 0;
      TranslationGame.correctCount = 0;
      TranslationGame.wrongCount = 0;
      TranslationGame.streak = 0;
      TranslationGame.bestStreak = 0;
      TranslationGame.isComplete = false;
      TranslationGame.isAnswered = false;
      buildTranslationPool();
      updateTranslationStatsUI();
      document.getElementById('translationResetBtn').style.display = 'none';
      document.getElementById('translationNextBtn').style.display = 'none';
      document.getElementById('transStreakBar').style.display = 'none';
      if (TranslationGame.pool.length > 0) {
        renderTranslationCard();
      }
    }

    function pickWrongOptions(correctWord, count) {
      // Pick `count` random words from the pool that are different from correctWord
      const others = allWords.filter(w => w.id !== correctWord.id);
      const shuffled = shuffleArray([...others]);
      return shuffled.slice(0, Math.min(count, shuffled.length));
    }

    function renderTranslationCard() {
      if (TranslationGame.currentIndex >= TranslationGame.pool.length) {
        renderTranslationComplete();
        return;
      }

      TranslationGame.isAnswered = false;
      const word = TranslationGame.pool[TranslationGame.currentIndex];

      // Randomly choose direction
      TranslationGame.direction = Math.random() > 0.5 ? 'en2zh' : 'zh2en';

      // Generate 4 options (1 correct + 3 wrong)
      const wrongOptions = pickWrongOptions(word, 3);
      let options = [];

      if (TranslationGame.direction === 'en2zh') {
        // Show English word, pick Chinese definition
        options = [word, ...wrongOptions].map(w => ({
          id: w.id,
          text: w.definition,
          isCorrect: w.id === word.id,
        }));
      } else {
        // Show Chinese definition, pick English word
        options = [word, ...wrongOptions].map(w => ({
          id: w.id,
          text: w.word,
          isCorrect: w.id === word.id,
        }));
      }

      // Shuffle options
      options = shuffleArray(options);

      const card = document.getElementById('translationCard');
      card.className = 'game-card';

      const questionText = TranslationGame.direction === 'en2zh' ? word.word : word.definition;
      const directionLabel = TranslationGame.direction === 'en2zh' ? '选出正确的中文释义' : '选出正确的英文单词';

      card.innerHTML = `
        <span class="game-card__score-badge">⭐ ${word.difficulty}/5</span>
        <div class="translation__question">${questionText}</div>
        ${TranslationGame.direction === 'en2zh' ? `<div style="font-size:var(--text-sm);color:var(--color-text-secondary);margin-bottom:20px">/${word.pronunciation}/</div>` : ''}
        <div class="translation__direction">${directionLabel}</div>
        <div class="translation__options" id="translationOptions">
          ${options.map((opt, i) => `
            <button class="translation__option" data-option-idx="${i}" data-correct="${opt.isCorrect}" onclick="selectTranslationOption(${i}, this)">
              ${opt.text}
            </button>
          `).join('')}
        </div>
      `;

      document.getElementById('translationNextBtn').style.display = 'none';
      document.getElementById('translationActions').querySelector('.btn-game--ghost').style.display = '';

      gsap.fromTo(card, { opacity: 0, y: 30, scale: 0.95 }, { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: 'power3.out' });
    }

    function selectTranslationOption(idx, btn) {
      if (TranslationGame.isAnswered) return;
      TranslationGame.isAnswered = true;

      const isCorrect = btn.getAttribute('data-correct') === 'true';
      const word = TranslationGame.pool[TranslationGame.currentIndex];

      // Disable all options
      document.querySelectorAll('.translation__option').forEach(o => o.classList.add('translation__option--disabled'));

      if (isCorrect) {
        btn.classList.add('translation__option--correct');
        TranslationGame.correctCount++;
        TranslationGame.streak++;
        if (TranslationGame.streak > TranslationGame.bestStreak) {
          TranslationGame.bestStreak = TranslationGame.streak;
        }
        // Show streak
        const streakBar = document.getElementById('transStreakBar');
        streakBar.style.display = 'flex';
        document.getElementById('transStreakCount').textContent = TranslationGame.streak;
        gsap.fromTo(streakBar, { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(1.4)' });
      } else {
        btn.classList.add('translation__option--wrong');
        TranslationGame.wrongCount++;
        TranslationGame.streak = 0;
        document.getElementById('transStreakBar').style.display = 'none';
        // Highlight the correct option
        document.querySelectorAll('.translation__option').forEach(o => {
          if (o.getAttribute('data-correct') === 'true') {
            o.classList.add('translation__option--reveal');
          }
        });
      }

      TranslationGame.round++;
      updateTranslationStatsUI();

      // Show next button
      document.getElementById('translationNextBtn').style.display = '';
      document.getElementById('translationActions').querySelector('.btn-game--ghost').style.display = 'none';
      gsap.fromTo(document.getElementById('translationNextBtn'), { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.3 });
    }

    function nextTranslationWord() {
      TranslationGame.isAnswered = false;
      TranslationGame.currentIndex++;

      if (TranslationGame.currentIndex >= TranslationGame.pool.length) {
        renderTranslationComplete();
      } else {
        const card = document.getElementById('translationCard');
        const actions = document.getElementById('translationActions');
        gsap.to([card, actions], { opacity: 0, y: -20, duration: 0.25, ease: 'power2.in', onComplete: () => {
          renderTranslationCard();
          gsap.to([card, actions], { opacity: 1, y: 0, duration: 0.3, ease: 'power2.out' });
        }});
      }
    }

    function skipTranslationWord() {
      if (TranslationGame.isAnswered) return;
      TranslationGame.isAnswered = true;
      TranslationGame.wrongCount++;
      TranslationGame.streak = 0;
      TranslationGame.round++;
      document.getElementById('transStreakBar').style.display = 'none';
      updateTranslationStatsUI();

      // Reveal correct answer
      document.querySelectorAll('.translation__option').forEach(o => {
        o.classList.add('translation__option--disabled');
        if (o.getAttribute('data-correct') === 'true') {
          o.classList.add('translation__option--reveal');
        }
      });

      TranslationGame.currentIndex++;
      document.getElementById('translationNextBtn').style.display = '';
      document.getElementById('translationActions').querySelector('.btn-game--ghost').style.display = 'none';
    }

    function renderTranslationComplete() {
      TranslationGame.isComplete = true;
      const card = document.getElementById('translationCard');
      const total = TranslationGame.round;
      const pct = total > 0 ? Math.round((TranslationGame.correctCount / total) * 100) : 0;

      card.className = 'game-card game-card--complete';
      card.innerHTML = `
        <div class="game-card__complete-icon">${pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚'}</div>
        <div class="game-card__complete-title">${pct >= 80 ? '翻译达人！' : pct >= 50 ? '继续加油！' : '挑战完成'}</div>
        <div class="game-card__complete-stats">
          共完成 <strong>${total}</strong> 题<br>
          正确 <strong style="color:var(--color-success)">${TranslationGame.correctCount}</strong> ·
          错误 <strong style="color:var(--color-error)">${TranslationGame.wrongCount}</strong><br>
          正确率 <strong>${pct}%</strong> ·
          最佳连击 <strong style="color:var(--color-accent)">${TranslationGame.bestStreak}</strong>
        </div>
      `;
      gsap.fromTo(card, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.6, ease: 'back.out(1.4)' });

      document.getElementById('translationActions').innerHTML = '';
      document.getElementById('translationResetBtn').style.display = '';
      document.getElementById('transStreakBar').style.display = 'none';
    }

    function resetTranslationGame() {
      initTranslationGame();
      document.getElementById('translationActions').innerHTML = `
        <button class="btn-game btn-game--ghost" onclick="skipTranslationWord()">跳过</button>
        <button class="btn-game btn-game--primary" id="translationNextBtn" onclick="nextTranslationWord()" style="display:none">下一题 →</button>
      `;
    }

    function updateTranslationStatsUI() {
      document.getElementById('transStatRound').textContent = TranslationGame.round;
      document.getElementById('transStatCorrect').textContent = TranslationGame.correctCount;
      document.getElementById('transStatWrong').textContent = TranslationGame.wrongCount;
      document.getElementById('transStatBest').textContent = TranslationGame.bestStreak;
    }

    /* ── Bootstrap ── */
    loadWordBank();
  </script>
</body>
</html>
