<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模拟试题 — Fast CET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="../css/reset.css?v=c16ecbc">
  <link rel="stylesheet" href="../css/variables.css?v=c16ecbc">
  <link rel="stylesheet" href="../css/global.css?v=c16ecbc">
  <link rel="stylesheet" href="../css/nav.css?v=c16ecbc">
  <link rel="stylesheet" href="../css/content.css?v=c16ecbc">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
</head>
<body>
  <main class="content-page container">
    <div class="breadcrumb">
      <a href="../index.html">首页</a>
      <span class="breadcrumb__sep">/</span>
      <span class="breadcrumb__current">模拟试题</span>
    </div>
    <header class="page-header">
      <h1>模拟试题</h1>
      <p>3套高仿真 CET-4 模拟试卷，严格遵循考试大纲，覆盖全部题型，助你查漏补缺</p>
    </header>
    <div class="filter-tags" id="filterTags">
      <button class="filter-tag filter-tag--active" data-filter="all">全部</button>
      <button class="filter-tag" data-filter="mock">模拟卷</button>
    </div>
    <div class="exam-grid" id="examGrid">
      <div class="skeleton" style="height:200px"></div>
      <div class="skeleton" style="height:200px"></div>
      <div class="skeleton" style="height:200px"></div>
    </div>
  </main>

  <script src="../js/main.js?v=c16ecbc"></script>
  <script src="../js/data-loader.js?v=c16ecbc"></script>
  <script src="../js/exam-renderer.js?v=c16ecbc"></script>
  <script src="../js/filter.js?v=c16ecbc"></script>
  <script src="../js/content-animations.js?v=c16ecbc"></script>
  <script>
    initApp();
    ExamRenderer.renderExamGrid('examGrid', { type: 'mock' }).then(() => {
      Filter.init('filterTags', 'examGrid', { filterAttr: 'data-type' });
      ContentAnimations.init({ filterContainerId: 'filterTags', cardSelector: '.exam-card' });
    });
  </script>
</body>
</html>
