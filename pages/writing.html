<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作文训练 — Fast CET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="../css/reset.css?v=c16ecbc">
  <link rel="stylesheet" href="../css/variables.css?v=c16ecbc">
  <link rel="stylesheet" href="../css/global.css?v=c16ecbc">
  <link rel="stylesheet" href="../css/nav.css?v=c16ecbc">
  <link rel="stylesheet" href="../css/content.css?v=c16ecbc">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
</head>
<body>
  <main class="content-page container">
    <div class="breadcrumb">
      <a href="../index.html">首页</a>
      <span class="breadcrumb__sep">/</span>
      <span class="breadcrumb__current">作文训练</span>
    </div>
    <header class="page-header">
      <h1>作文训练</h1>
      <p>涵盖议论文、书信、图表作文、记叙文、应用文等常考题型，配套参考范文、写作要点与实用表达，帮你提升写作能力</p>
    </header>
    <div class="filter-tags" id="filterTags">
      <button class="filter-tag filter-tag--active" data-filter="all">全部</button>
      <button class="filter-tag" data-filter="argumentation">议论文</button>
      <button class="filter-tag" data-filter="letter">书信</button>
      <button class="filter-tag" data-filter="chart">图表作文</button>
      <button class="filter-tag" data-filter="narrative">记叙文</button>
      <button class="filter-tag" data-filter="practical">应用文</button>
    </div>
    <div class="question-list" id="questionList">
      <div class="skeleton" style="height:200px"></div>
      <div class="skeleton" style="height:200px"></div>
      <div class="skeleton" style="height:200px"></div>
    </div>
  </main>

  <script src="../js/main.js?v=c16ecbc"></script>
  <script src="../js/data-loader.js?v=c16ecbc"></script>
  <script src="../js/exam-renderer.js?v=c16ecbc"></script>
  <script src="../js/filter.js?v=4d8947e"></script>
  <script src="../js/content-animations.js?v=c16ecbc"></script>
  <script>
    initApp();

    async function loadWritingBank() {
      const container = document.getElementById('questionList');
      const data = await DataLoader.loadQuestionBank('writing');
      if (!data || !data.items) {
        container.innerHTML = '<p class="empty-state">暂无作文练习数据</p>';
        return;
      }
      container.innerHTML = '';
      data.items.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'question-card filter-item';
        card.setAttribute('data-category', item.category || 'argumentation');

        const difficultyStars = '★'.repeat(item.difficulty || 3) + '☆'.repeat(5 - (item.difficulty || 3));
        const categoryLabel = {
          argumentation: '议论文', letter: '书信', chart: '图表作文',
          narrative: '记叙文', practical: '应用文'
        }[item.category] || item.category;

        card.innerHTML = `
          <div class="question-card__header">
            <span class="question-card__badge">${categoryLabel}</span>
            <span class="question-card__difficulty" title="难度 ${item.difficulty || 3}/5">${difficultyStars}</span>
          </div>
          <div class="question-card__body">
            <p class="question-card__stem" style="font-size:1.1rem;font-weight:700;margin-bottom:10px;color:var(--color-text);">
              ${item.topic || '作文题目 ' + (i + 1)}
            </p>
            <div class="writing-direction" style="background:var(--glass-bg);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:12px;font-size:0.9rem;line-height:1.8;color:var(--color-text-secondary);border-left:3px solid var(--color-accent);">
              ${item.direction || '暂无写作要求'}
            </div>
            <div class="writing-sample" style="display:none;background:rgba(255,94,77,0.04);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:16px;font-size:0.9rem;line-height:2;color:var(--color-text-secondary);white-space:pre-line;">
              <p style="font-weight:600;color:var(--color-primary);margin-bottom:8px;">参考范文</p>
              ${item.sampleEssay || '暂无参考范文'}
            </div>
          </div>
          <div class="question-card__footer" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
            <span class="question-card__meta">难度 ${item.difficulty || 3}/5</span>
            <div style="display:flex;gap:8px;">
              <button class="btn-ghost question-card__action writing-sample-toggle" onclick="toggleSample(this)">
                查看范文 <span class="link-arrow">→</span>
              </button>
              <button class="btn-ghost question-card__action writing-detail-toggle" onclick="toggleKeyPoints(this)">
                写作要点 <span class="link-arrow">→</span>
              </button>
            </div>
          </div>
          <div class="question-card__detail" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--color-border);">
            <div style="margin-bottom:16px;">
              <p style="font-weight:600;margin-bottom:10px;color:var(--color-primary);">写作要点</p>
              <ul style="padding-left:20px;line-height:2.2;color:var(--color-text-secondary);">
                ${item.keyPoints ? item.keyPoints.map(kp => `<li>${kp}</li>`).join('') : '<li>暂无要点</li>'}
              </ul>
            </div>
            <div>
              <p style="font-weight:600;margin-bottom:10px;color:var(--color-accent);">实用表达</p>
              <ul style="padding-left:20px;line-height:2.2;color:var(--color-text-secondary);">
                ${item.usefulExpressions ? item.usefulExpressions.map(ue => `<li>${ue}</li>`).join('') : '<li>暂无数据</li>'}
              </ul>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    loadWritingBank().then(() => {
      Filter.init('filterTags', 'questionList', { filterAttr: 'data-category', itemSelector: '.question-card' });
      ContentAnimations.init({ filterContainerId: 'filterTags', cardSelector: '.question-card' });
    });

    function toggleSample(btn) {
      const sample = btn.closest('.question-card').querySelector('.writing-sample');
      const isHidden = sample.style.display === 'none';
      sample.style.display = isHidden ? 'block' : 'none';
      btn.innerHTML = isHidden ? '隐藏范文 <span class="link-arrow">↑</span>' : '查看范文 <span class="link-arrow">→</span>';
      if (isHidden) {
        gsap.fromTo(sample, {opacity:0, y:-10}, {opacity:1, y:0, duration:0.4, ease:'power2.out'});
      }
    }

    function toggleKeyPoints(btn) {
      const detail = btn.closest('.question-card').querySelector('.question-card__detail');
      const isHidden = detail.style.display === 'none';
      detail.style.display = isHidden ? 'block' : 'none';
      btn.innerHTML = isHidden ? '隐藏要点 <span class="link-arrow">↑</span>' : '写作要点 <span class="link-arrow">→</span>';
      if (isHidden) {
        gsap.fromTo(detail, {opacity:0, y:-10}, {opacity:1, y:0, duration:0.4, ease:'power2.out'});
      }
    }
  </script>
</body>
</html>
